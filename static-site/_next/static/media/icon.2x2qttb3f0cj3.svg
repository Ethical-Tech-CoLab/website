<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Ethical Tech CoLab">
  <defs>
    <linearGradient id="etc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <!-- Signature lime (--accent), with the same slight fall-off the old
         white-to-grey letters had. Keep in step with icon.png / apple-icon.png. -->
    <linearGradient id="etc-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8f04b"/>
      <stop offset="1" stop-color="#a9cc3d"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#etc-bg)"/>
  <text x="16" y="21.5" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="13" letter-spacing="0.3" fill="url(#etc-fg)">ETC</text>
</svg>
